services:
  vs-ai-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: vs-ai-proxy:latest
    container_name: vs-ai-proxy
    environment:
      CONFIG_PATH: /data/config.json
      STORE_PATH: /data/logs.json
      PORT: ${PORT:-12345}
      HOST: 0.0.0.0
      PROXY_API_KEY: ${PROXY_API_KEY:-}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
    ports:
      - "${BIND_HOST:-127.0.0.1}:${PORT:-12345}:12345"
    volumes:
      - vs-ai-proxy-data:/data
    restart: unless-stopped

volumes:
  vs-ai-proxy-data:
