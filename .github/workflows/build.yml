# VS AI Proxy 自动构建工作流
# 触发条件:
#   - push/PR 到 main: 编译验证 + go vet
#   - 推送 v* 或数字开头标签: 全平台编译 + 创建 GitHub Release

name: build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
      - '[0-9]*'
  pull_request:
    branches: [main]

jobs:
  # ─── 编译验证 ──────────────────────────────
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: 静态检查
        run: go vet ./...

      - name: 编译（当前平台）
        run: make build

      - name: 校验构建版本
        run: |
          version="$(./vs-ai-proxy --version)"
          echo "built version: ${version}"
          test -n "${version}"
          test "${version}" != "dev"

  windows-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: 关键包测试
        shell: bash
        run: go test ./cmd/server ./internal/update ./internal/api -count=1

      - name: Windows 构建版本校验
        shell: bash
        run: |
          version="$(git describe --tags --always --dirty 2>/dev/null || echo dev)"
          go build -ldflags="-s -w -X main.version=${version}" -o vs-ai-proxy.exe ./cmd/server
          built="$(./vs-ai-proxy.exe --version)"
          echo "built version: ${built}"
          test "${built}" = "${version}"
          test "${built}" != "dev"

  # ─── 全平台构建 + 发布 ─────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [check, windows-smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许创建 Release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: 跨平台编译 + 打包
        run: make release

      - name: 生成 Release 说明
        run: .bin/release-notes.sh "${GITHUB_REF_NAME}" > release-notes.md

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: release-notes.md
